dataset: ifeval
script: eval_if_eval.py

# Shared evaluation parameters
model_path: allenai/Llama-3.1-Tulu-3-8B-SFT
batch_size: 4
device: cuda
limit: null

# Only adapter_path and output_dir vary across experiments
experiments:
  - name: base_sft
    adapter_path: null
    output_dir: prediction/ifeval/base_sft

  - name: dpo
    adapter_path: iiCEMAN/Llama-3.1-Tulu-3-8B-DPO
    output_dir: prediction/ifeval/dpo

  - name: uf_self_dpo
    adapter_path: iiCEMAN/Llama-3.1-Tulu-3-8B-UF-Self-DPO
    output_dir: prediction/ifeval/uf_self_dpo

  - name: uf_if_dpo
    adapter_path: iiCEMAN/Llama-3.1-Tulu-3-8B-uf-IF-DPO
    output_dir: prediction/ifeval/uf_if_dpo

  - name: uf_if_dpo_next
    adapter_path: iiCEMAN/Llama-3.1-Tulu-3-8B-uf-IF-DPO-next
    output_dir: prediction/ifeval/uf_if_dpo_next
